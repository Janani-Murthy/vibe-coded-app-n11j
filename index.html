<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Expense Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .card h2 {
            font-size: 0.9em;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 10px;
        }
        .card .amount {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .expense .amount { color: #e74c3c; }
        .savings .amount { color: #27ae60; }
        .investment .amount { color: #3498db; }
        .balance .amount { color: #2c3e50; }
        .balance-value { font-size: 1.2em; color: #666; margin-top: 5px; }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .main-content { grid-template-columns: 1fr; }
        }
        .card h3 {
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { opacity: 0.9; transform: scale(1.02); }
        .transactions-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        .transaction-item:hover { background: #f9f9f9; }
        .transaction-info { flex: 1; }
        .transaction-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }
        .transaction-category {
            font-size: 0.85em;
            color: #999;
        }
        .transaction-amount {
            font-weight: bold;
            font-size: 1.1em;
        }
        .transaction-amount.expense { color: #e74c3c; }
        .transaction-amount.savings { color: #27ae60; }
        .transaction-amount.investment { color: #3498db; }
        .transaction-date {
            font-size: 0.8em;
            color: #999;
            margin-top: 3px;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            margin-left: 10px;
            transition: background 0.3s;
        }
        .delete-btn:hover { background: #c0392b; }
        .category-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            margin-top: 5px;
        }
        .category-tag.food { background: #ffeaa7; color: #d63031; }
        .category-tag.transport { background: #81ecec; color: #00b894; }
        .category-tag.shopping { background: #fab1a0; color: #e17055; }
        .category-tag.bills { background: #a29bfe; color: #6c5ce7; }
        .category-tag.entertainment { background: #fd79a8; color: #e84393; }
        .category-tag.health { background: #55efc4; color: #00b894; }
        .category-tag.savings { background: #00b894; color: white; }
        .category-tag.investment { background: #0984e3; color: white; }
        .category-tag.other { background: #b2bec3; color: #2d3436; }
        .chart-container {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .chart-bars {
            display: flex;
            align-items: flex-end;
            height: 200px;
            gap: 10px;
            padding: 20px 0;
        }
        .chart-bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
        }
        .chart-bar {
            width: 100%;
            background: linear-gradient(to top, #667eea, #764ba2);
            border-radius: 8px 8px 0 0;
            min-height: 5px;
            transition: height 0.5s;
            max-height: 160px;
        }
        .chart-label {
            margin-top: 10px;
            font-size: 0.75em;
            color: #666;
            text-align: center;
        }
        .chart-value {
            font-size: 0.7em;
            color: #333;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .income-input {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .empty-state svg { margin-bottom: 15px; }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .summary-row:last-child { border-bottom: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Monthly Expense Tracker</h1>
        
        <div class="dashboard">
            <div class="card income">
                <h2>Monthly Income</h2>
                <div class="amount" id="totalIncome">$0.00</div>
                <input type="number" id="incomeInput" placeholder="Enter monthly income" style="margin-top:15px;padding:8px;border:2px solid #e0e0e0;border-radius:8px;" step="0.01">
                <button class="btn btn-primary" style="margin-top:10px;" onclick="setIncome()">Set Income</button>
            </div>
            <div class="card expense">
                <h2>Total Expenses</h2>
                <div class="amount" id="totalExpense">$0.00</div>
            </div>
            <div class="card savings">
                <h2>Total Savings</h2>
                <div class="amount" id="totalSavings">$0.00</div>
            </div>
            <div class="card investment">
                <h2>Investments</h2>
                <div class="amount" id="totalInvestment">$0.00</div>
            </div>
            <div class="card balance">
                <h2>Net Balance</h2>
                <div class="amount" id="netBalance">$0.00</div>
                <div class="balance-value" id="balanceInfo"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h3>Add Transaction</h3>
                <div class="form-group">
                    <label>Type</label>
                    <select id="transactionType" onchange="updateCategories()">
                        <option value="expense">Expense</option>
                        <option value="savings">Savings</option>
                        <option value="investment">Investment</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="transactionCategory">
                        <option value="food">🍔 Food & Dining</option>
                        <option value="transport">🚗 Transport</option>
                        <option value="shopping">🛍️ Shopping</option>
                        <option value="bills">💡 Bills & Utilities</option>
                        <option value="entertainment">🎬 Entertainment</option>
                        <option value="health">💊 Health</option>
                        <option value="other">📦 Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="transactionDesc" placeholder="e.g., Grocery shopping">
                </div>
                <div class="form-group">
                    <label>Amount ($)</label>
                    <input type="number" id="transactionAmount" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="transactionDate">
                </div>
                <button class="btn btn-primary" onclick="addTransaction()">Add Transaction</button>
            </div>

            <div class="card">
                <h3>Transactions</h3>
                <div class="transactions-list" id="transactionsList">
                    <div class="empty-state">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        <p>No transactions yet. Add your first one!</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <h3 style="color:#333;border-bottom:2px solid #667eea;padding-bottom:10px;margin-bottom:20px;">Spending by Category</h3>
            <div class="chart-bars" id="chartBars">
                <div class="empty-state" style="width:100%;">
                    <p>Add expenses to see the chart</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let income = parseFloat(localStorage.getItem('income')) || 0;

        document.getElementById('transactionDate').valueAsDate = new Date();

        function updateCategories() {
            const type = document.getElementById('transactionType').value;
            const categorySelect = document.getElementById('transactionCategory');
            
            if (type === 'savings' || type === 'investment') {
                categorySelect.innerHTML = '<option value="savings">💰 Savings</option>';
                if (type === 'investment') {
                    categorySelect.innerHTML = '<option value="investment">📈 Investment</option>';
                }
            } else {
                categorySelect.innerHTML = `
                    <option value="food">🍔 Food & Dining</option>
                    <option value="transport">🚗 Transport</option>
                    <option value="shopping">🛍️ Shopping</option>
                    <option value="bills">💡 Bills & Utilities</option>
                    <option value="entertainment">🎬 Entertainment</option>
                    <option value="health">💊 Health</option>
                    <option value="other">📦 Other</option>
                `;
            }
        }

        function setIncome() {
            const val = parseFloat(document.getElementById('incomeInput').value);
            if (val && val > 0) {
                income = val;
                localStorage.setItem('income', income);
                document.getElementById('incomeInput').value = '';
                updateDashboard();
            }
        }

        function addTransaction() {
            const type = document.getElementById('transactionType').value;
            const category = document.getElementById('transactionCategory').value;
            const desc = document.getElementById('transactionDesc').value.trim();
            const amount = parseFloat(document.getElementById('transactionAmount').value);
            const date = document.getElementById('transactionDate').value;

            if (!desc || !amount || amount <= 0 || !date) {
                alert('Please fill in all fields correctly.');
                return;
            }

            const transaction = {
                id: Date.now(),
                type,
                category,
                description: desc,
                amount,
                date
            };

            transactions.push(transaction);
            localStorage.setItem('transactions', JSON.stringify(transactions));

            document.getElementById('transactionDesc').value = '';
            document.getElementById('transactionAmount').value = '';

            updateDashboard();
        }

        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            localStorage.setItem('transactions', JSON.stringify(transactions));
            updateDashboard();
        }

        function updateDashboard() {
            const totalExpense = transactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);
            
            const totalSavings = transactions
                .filter(t => t.type === 'savings')
                .reduce((sum, t) => sum + t.amount, 0);
            
            const totalInvestment = transactions
                .filter(t => t.type === 'investment')
                .reduce((sum, t) => sum + t.amount, 0);

            const netBalance = income - totalExpense - totalSavings - totalInvestment;

            document.getElementById('totalIncome').textContent = `$${income.toFixed(2)}`;
            document.getElementById('totalExpense').textContent = `$${totalExpense.toFixed(2)}`;
            document.getElementById('totalSavings').textContent = `$${totalSavings.toFixed(2)}`;
            document.getElementById('totalInvestment').textContent = `$${totalInvestment.toFixed(2)}`;
            document.getElementById('netBalance').textContent = `$${netBalance.toFixed(2)}`;
            
            const balanceInfo = document.getElementById('balanceInfo');
            if (netBalance >= 0) {
                balanceInfo.textContent = '✅ On track';
                balanceInfo.style.color = '#27ae60';
            } else {
                balanceInfo.textContent = '⚠️ Over budget';
                balanceInfo.style.color = '#e74c3c';
            }

            renderTransactions();
            renderChart(totalExpense);
        }

        function renderTransactions() {
            const list = document.getElementById('transactionsList');
            
            if (transactions.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        <p>No transactions yet. Add your first one!</p>
                    </div>`;
                return;
            }

            const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            list.innerHTML = sorted.map(t => {
                const sign = t.type === 'expense' ? '-' : '+';
                const categoryLabel = getCategoryLabel(t.category);
                return `
                    <div class="transaction-item">
                        <div class="transaction-info">
                            <div class="transaction-title">${t.description}</div>
                            <div class="transaction-category">
                                <span class="category-tag ${t.category}">${categoryLabel}</span>
                            </div>
                            <div class="transaction-date">${formatDate(t.date)}</div>
                        </div>
                        <div style="text-align:right;">
                            <div class="transaction-amount ${t.type}">${sign}$${t.amount.toFixed(2)}</div>
                            <button class="delete-btn" onclick="deleteTransaction(${t.id})">Delete</button>
                        </div>
                    </div>`;
            }).join('');
        }

        function getCategoryLabel(cat) {
            const labels = {
                food: '🍔 Food',
                transport: '🚗 Transport',
                shopping: '🛍️ Shopping',
                bills: '💡 Bills',
                entertainment: '🎬 Fun',
                health: '💊 Health',
                savings: '💰 Savings',
                investment: '📈 Investment',
                other: '📦 Other'
            };
            return labels[cat] || cat;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function renderChart(totalExpense) {
            const chartBars = document.getElementById('chartBars');
            
            if (transactions.filter(t => t.type === 'expense').length === 0) {
                chartBars.innerHTML = '<div class="empty-state" style="width:100%;"><p>Add expenses to see the chart</p></div>';
                return;
            }

            const categories = {};
            transactions.filter(t => t.type === 'expense').forEach(t => {
                categories[t.category] = (categories[t.category] || 0) + t.amount;
            });

            const maxAmount = Math.max(...Object.values(categories), 1);
            const categoryNames = {
                food: 'Food',
                transport: 'Transport',
                shopping: 'Shopping',
                bills: 'Bills',
                entertainment: 'Fun',
                health: 'Health',
                other: 'Other'
            };

            chartBars.innerHTML = Object.entries(categories).map(([cat, amount]) => {
                const height = (amount / maxAmount) * 160;
                return `
                    <div class="chart-bar-wrapper">
                        <div class="chart-value">$${amount.toFixed(0)}</div>
                        <div class="chart-bar" style="height: ${height}px;"></div>
                        <div class="chart-label">${categoryNames[cat] || cat}</div>
                    </div>`;
            }).join('');
        }

        // Initialize
        updateDashboard();
    </script>
</body>
</html>
